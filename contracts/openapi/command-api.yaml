openapi: 3.1.0
info:
  title: Super AV Phase 1 Operator Command API
  version: 1.0.0
paths:
  /api/v1/rooms/{roomId}/commands:
    post:
      parameters:
        - name: X-Correlation-Id
          in: header
          required: true
          schema: { type: string }
      responses:
        '202': { description: Command accepted }
  /api/v1/commands/{commandId}:
    get:
      parameters:
        - name: X-Correlation-Id
          in: header
          required: true
          schema: { type: string }
      responses:
        '200': { description: Command status }
