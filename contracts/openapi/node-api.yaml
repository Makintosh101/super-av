openapi: 3.1.0
info:
  title: Super AV Phase 1 Node Provisioning and Device API
  version: 1.0.0
servers:
  - url: https://api.example.com
security:
  - deviceCertificate: []
paths:
  /api/v1/node/registrations:
    post:
      summary: Register an unclaimed node for pairing
      security: []
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '202':
          description: Registration accepted for unclaimed device
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RegistrationResponse' }
        '409': { description: Device already claimed, suspended or retired, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
  /api/v1/node/registrations/{registrationId}:
    get:
      summary: Get node registration status
      security: []
      parameters:
        - name: registrationId
          in: path
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: Registration status for unclaimed, claimed, suspended, retired or revoked devices
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RegistrationStatusResponse' }
  /api/v1/pairing/sessions:
    post:
      summary: Create a pairing session
      security: []
      responses:
        '201':
          description: Pairing session created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PairingSessionResponse' }
  /api/v1/pairing/sessions/{code}/claim:
    post:
      summary: Claim a pairing session by code
      security:
        - userSession: []
      parameters:
        - name: code
          in: path
          required: true
          schema: { type: string, minLength: 6, maxLength: 12 }
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Pairing claimed and certificate metadata recorded
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PairingClaimResponse' }
        '410': { description: Pairing code expired, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
  /api/v1/devices/{deviceId}/assignments:
    post:
      summary: Assign a claimed Phase 1 device to the Phase 1 room
      security:
        - userSession: []
      parameters:
        - name: deviceId
          in: path
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Device assigned to room
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RoomAssignmentResponse' }
  /api/v1/node/bootstrap:
    get:
      summary: Fetch node bootstrap document
      responses:
        '200': { description: Bootstrap document }
  /api/v1/configuration/desired:
    get:
      summary: Fetch desired configuration for the authenticated node
      responses:
        '200': { description: Desired configuration }
  /api/v1/configuration/report:
    post:
      summary: Report node configuration activation status
      responses:
        '202': { description: Configuration report accepted }
components:
  securitySchemes:
    deviceCertificate:
      type: mutualTLS
      description: Node-only credential; never accepted as an operator credential.
    userSession:
      type: http
      scheme: bearer
      description: User API credential; never accepted as a node credential.
  parameters:
    CorrelationId:
      name: X-Correlation-Id
      in: header
      required: true
      schema: { type: string, pattern: '^corr_[0-9A-HJKMNP-TV-Z]{26}$' }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema: { type: string, minLength: 8, maxLength: 128 }
  schemas:

    RegistrationResponse:
      type: object
      required: [registrationId, deviceId, status, bootstrapStatus, expiresAt]
      properties:
        registrationId: { type: string }
        deviceId: { type: string }
        status: { type: string, enum: [pending] }
        bootstrapStatus: { type: string, enum: [limited] }
        expiresAt: { type: string, format: date-time, pattern: 'Z$' }
    RegistrationStatusResponse:
      type: object
      required: [registrationId, deviceId, status, bootstrapStatus]
      properties:
        registrationId: { type: string }
        deviceId: { type: string }
        status: { type: string, enum: [pending, unclaimed, claimed, assigned, suspended, retired, revoked] }
        bootstrapStatus: { type: string, enum: [limited, claimed] }
        companyId: { type: string }
        assignedRoom:
          type: object
          required: [roomId, roomCodeName]
          properties:
            roomId: { type: string }
            roomCodeName: { type: string }
    PairingSessionResponse:
      type: object
      required: [pairingSessionId, deviceId, code, qrToken, expiresAt, attempts]
      properties:
        pairingSessionId: { type: string }
        deviceId: { type: string }
        code: { type: string, minLength: 6, maxLength: 12 }
        qrToken: { type: string }
        expiresAt: { type: string, format: date-time, pattern: 'Z$' }
        attempts: { type: integer, minimum: 0 }
    PairingClaimResponse:
      type: object
      required: [deviceId, companyId, status, certificate]
      properties:
        deviceId: { type: string }
        companyId: { type: string }
        status: { type: string, enum: [confirmation_required, claimed] }
        confirmation:
          type: object
          properties:
            fingerprint: { type: string }
            installationId: { type: string }
        certificate:
          type: object
          required: [credentialId, deviceId, certificateThumbprint, status, issuedAt, expiresAt]
          properties:
            credentialId: { type: string }
            deviceId: { type: string }
            certificateThumbprint: { type: string }
            status: { type: string, enum: [active] }
            issuedAt: { type: string, format: date-time, pattern: 'Z$' }
            expiresAt: { type: string, format: date-time, pattern: 'Z$' }
    RoomAssignmentResponse:
      type: object
      required: [assignmentId, deviceId, roomId, status, assignedAt]
      properties:
        assignmentId: { type: string }
        deviceId: { type: string }
        roomId: { type: string }
        status: { type: string, enum: [active] }
        assignedAt: { type: string, format: date-time, pattern: 'Z$' }
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, severity, category, correlationId, timestamp]
          properties:
            code: { type: string }
            message: { type: string }
            severity: { type: string, enum: [Info, Warning, Error, Critical] }
            category: { type: string }
            correlationId: { type: string }
            timestamp: { type: string, format: date-time, pattern: 'Z$' }
            details: { type: object }
